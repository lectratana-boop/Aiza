<h1>Aiza App</h1>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBY_zHJAaNLtXDBlD1TYMzALlMlMHNBwWk",
  authDomain: "aiza-38b31.firebaseapp.com",
  databaseURL: "https://aiza-38b31-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "aiza-38b31"                                                                                                                 
};

firebase.initializeApp(firebaseConfig);
const fbDB = firebase.database();
const fbRef = fbDB.ref("aiza");

// DATABASE
var DB = {u:[],i:[],req:[]};

function toArr(obj){
  if(Array.isArray(obj)) return obj.filter(x=>x!=null);
  if(!obj) return [];
  return Object.keys(obj).map(k=>obj[k]).filter(x=>x!=null);
}

function normalizeDB(raw){
  if(!raw) return {u:[],i:[],req:[]};
  return {
    u: toArr(raw.u),
    i: toArr(raw.i),
    req: toArr(raw.req)
  };
}

function startRealtimeSync(){
  fbRef.on('value', function(snap){
    DB = normalizeDB(snap.val());
    console.log("DB synced");
  });
}

// LOGIN SIMPLE (encoded password)
function login(email, password){
  var u = DB.u.find(x=>x.em===email && atob(x.pw)===password);
  if(u){
    localStorage.setItem("aiza_uid", u.id);
    alert("Login OK");
  } else {
    alert("Erreur login");
  }
}

// INIT
window.onload = function(){
  startRealtimeSync();
};
</script>
