<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aiza - Mpikaroka Zavatra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .item-card:active { transform: scale(0.98); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #f8fafc; overflow-x: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Chargement des données sauvegardées
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('aiza_inventory');
                return saved ? JSON.parse(saved) : [];
            });

            const [search, setSearch] = useState("");
            const [isAdding, setIsAdding] = useState(false);
            const [lang, setLang] = useState("mg");

            // Formulaire pour un nouvel objet
            const [newItem, setNewItem] = useState({ name: "", location: "", desc: "", photo: "" });

            // Sauvegarde automatique
            useEffect(() => {
                localStorage.setItem('aiza_inventory', JSON.stringify(items));
                lucide.createIcons();
            }, [items, isAdding]);

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newItem.name || !newItem.location) return;
                const itemToAdd = { ...newItem, id: Date.now() };
                setItems([itemToAdd, ...items]);
                setNewItem({ name: "", location: "", desc: "", photo: "" });
                setIsAdding(false);
            };

            const deleteItem = (id) => {
                if(window.confirm(lang === 'mg' ? "Hofafana ve?" : "Supprimer ?")) {
                    setItems(items.filter(i => i.id !== id));
                }
            };

            const filteredItems = items.filter(i => 
                i.name.toLowerCase().includes(search.toLowerCase()) || 
                i.location.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-20">
                    {/* HEADER & RECHERCHE */}
                    <header className="bg-emerald-600 p-6 text-white sticky top-0 z-50 shadow-lg rounded-b-3xl">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-2xl font-black italic tracking-tighter">AIZA ?</h1>
                            <button onClick={() => setLang(lang === 'mg' ? 'fr' : 'mg')} className="text-[10px] font-bold border border-emerald-400 px-3 py-1 rounded-full">
                                {lang === 'mg' ? 'FR' : 'MG'}
                            </button>
                        </div>
                        
                        <div className="relative">
                            <input 
                                type="text" 
                                placeholder={lang === 'mg' ? "Hikaroka zavatra..." : "Où est l'objet ?"}
                                className="w-full rounded-2xl p-4 text-black shadow-inner outline-none focus:ring-4 focus:ring-yellow-400 transition-all text-lg"
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                            />
                            <div className="absolute right-4 top-4 text-emerald-600">
                                <i data-lucide="search"></i>
                            </div>
                        </div>
                    </header>

                    {/* LISTE DES OBJETS */}
                    <main className="p-4 flex-1">
                        {filteredItems.length === 0 && !isAdding && (
                            <div className="text-center py-20 text-slate-400">
                                <i data-lucide="package-search" class="mx-auto mb-2 w-12 h-12 opacity-20"></i>
                                <p>{lang === 'mg' ? "Tsy misy zavatra hita" : "Aucun objet trouvé"}</p>
                            </div>
                        )}

                        <div className="grid gap-4">
                            {filteredItems.map(item => (
                                <div key={item.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4 item-card relative">
                                    <div className="w-20 h-20 bg-slate-100 rounded-xl flex items-center justify-center overflow-hidden flex-shrink-0">
                                        {item.photo ? 
                                            <img src={item.photo} className="w-full h-full object-cover" /> : 
                                            <i data-lucide="camera" class="text-slate-300"></i>
                                        }
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="font-bold text-slate-800 text-lg leading-tight uppercase">{item.name}</h3>
                                        <p className="text-emerald-600 font-bold text-sm flex items-center mt-1">
                                            <i data-lucide="map-pin" class="w-3 h-3 mr-1"></i> {item.location}
                                        </p>
                                        <p className="text-slate-500 text-xs mt-1 italic">{item.desc}</p>
                                    </div>
                                    <button onClick={() => deleteItem(item.id)} className="absolute top-2 right-2 text-slate-300 hover:text-red-400">
                                        <i data-lucide="x-circle" size="18"></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* MODAL AJOUT (Affiche par dessus la liste) */}
                    {isAdding && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-end sm:items-center justify-center p-4 backdrop-blur-sm">
                            <form onSubmit={handleAdd} className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl animate-slide-up">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">{lang === 'mg' ? "Hampiditra zavatra" : "Ajouter un objet"}</h2>
                                    <button type="button" onClick={() => setIsAdding(false)} className="text-slate-400"><i data-lucide="x"></i></button>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase">{lang === 'mg' ? "Anaran'ilay zavatra" : "Nom de l'objet"}</label>
                                        <input required className="w-full bg-slate-50 p-3 rounded-xl border mt-1" type="text" placeholder="ex: Fanalahidy fiara" 
                                               value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase">{lang === 'mg' ? "Toerana misy azy" : "Emplacement précis"}</label>
                                        <input required className="w-full bg-slate-50 p-3 rounded-xl border mt-1" type="text" placeholder="ex: Chambre > Tiroir bureau" 
                                               value={newItem.location} onChange={e => setNewItem({...newItem, location: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase">Description / Fanamarihana</label>
                                        <textarea className="w-full bg-slate-50 p-3 rounded-xl border mt-1" rows="2" placeholder="ex: Ao anaty boaty kely mena"
                                                  value={newItem.desc} onChange={e => setNewItem({...newItem, desc: e.target.value})}></textarea>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase">Lien Photo (URL)</label>
                                        <input className="w-full bg-slate-50 p-3 rounded-xl border mt-1" type="text" placeholder="https://..."
                                               value={newItem.photo} onChange={e => setNewItem({...newItem, photo: e.target.value})} />
                                    </div>
                                    <button type="submit" className="w-full bg-emerald-600 text-white font-bold p-4 rounded-2xl shadow-lg shadow-emerald-200 active:bg-emerald-700 transition-all uppercase tracking-widest mt-4">
                                        {lang === 'mg' ? "Tehirizina" : "Enregistrer"}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* BOUTON FLOTTANT AJOUT */}
                    {!isAdding && (
                        <button 
                            onClick={() => setIsAdding(true)}
                            className="fixed bottom-6 right-6 w-16 h-16 bg-yellow-400 text-emerald-900 rounded-full shadow-2xl flex items-center justify-center animate-bounce z-40 border-4 border-white"
                        >
                            <i data-lucide="plus" size="32"></i>
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
