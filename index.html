<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiza - Admin & Firebase</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* ... Gardez vos styles CSS existants ici ... */
/* Ajout d'un style pour cacher les éléments admin par défaut */
.admin-only { display: none; }
#pgL:not(.on) { display: none; }
</style>
</head>
<body>

<script>
// ==========================================
// 1. CONFIGURATION FIREBASE (À REMPLIR)
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyBY_zHJAaNLtXDBlD1TYMzALlMlMHNBwWk",
  authDomain: "aiza-38b31.firebaseapp.com",
databaseURL: "https://aiza-38b31-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "aiza-38b31",
  storageBucket: "aiza-38b31.firebasestorage.app",
  messagingSenderId: "850157491678",
  appId: "1:850157491678:web:614b2b70b934cf09fcb94f",
};

// Initialisation
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ==========================================
// 2. ÉTAT DE L'APPLICATION
// ==========================================
let CU = null; // Current User (chargé depuis Firestore)
let lang = localStorage.getItem('aiza_l') || 'fr';

// ==========================================
// 3. SÉCURITÉ ET AUTHENTIFICATION
// ==========================================

// Observateur de connexion
auth.onAuthStateChanged(async (user) => {
  if (user) {
    // L'utilisateur est authentifié, on récupère son profil Firestore
    const userDoc = await db.collection('users').doc(user.uid).get();
    
    if (userDoc.exists) {
      CU = { id: user.uid, ...userDoc.data() };
      setupUIForUser();
    } else {
      // Si l'utilisateur existe en Auth mais pas en DB, on le déconnecte par sécurité
      logout();
    }
  } else {
    // Rediriger vers l'écran de login
    showLoginScreen();
  }
});

function setupUIForUser() {
  // Cacher le splash et le login
  document.getElementById('splash').style.display = 'none';
  document.getElementById('pgL').classList.remove('on');
  
  // Afficher le header et la nav
  document.getElementById('hdr').classList.add('v');
  document.getElementById('bnav').classList.add('v');

  // Sécurité Admin : Affichage conditionnel des menus
  if (CU.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
  }

  go('home'); // Aller à l'accueil
}

async function loginSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('le').value.trim();
  const pass = document.getElementById('lp').value;

  try {
    await auth.signInWithEmailAndPassword(email, pass);
    toast('Connexion réussie', 'ok');
  } catch (err) {
    toast('Erreur : ' + err.message, 'no');
  }
  return false;
}

function logout() {
  auth.signOut().then(() => {
    CU = null;
    location.reload(); // Recharge pour réinitialiser l'état proprement
  });
}

// ==========================================
// 4. GESTION DES DONNÉES (CRUD FIRESTORE)
// ==========================================

// Remplacer votre ancienne fonction d'ajout par celle-ci
async function saveItem() {
  const name = document.getElementById('aN').value.trim();
  const zone = document.getElementById('aZ').value;

  if (!name) return toast('Nom requis', 'no');

  const newItem = {
    uid: CU.id, // Liaison avec l'utilisateur
    name: name,
    zone: zone,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection('items').add(newItem);
    toast('Enregistré !', 'ok');
    closeM('mA');
    refreshList(); // Votre fonction de mise à jour de l'affichage
  } catch (e) {
    toast('Erreur de sauvegarde', 'no');
  }
}

// ==========================================
// 5. INITIALISATION
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
  // On laisse l'observateur Firebase (auth.onAuthStateChanged) gérer la suite
  setTimeout(() => {
    if (!auth.currentUser) {
      document.getElementById('splash').classList.add('off');
    }
  }, 1500);
});

function showLoginScreen() {
  document.getElementById('splash').classList.add('off');
  document.getElementById('pgL').classList.add('on');
  document.getElementById('hdr').classList.remove('v');
  document.getElementById('bnav').classList.remove('v');
}

// ... Vos autres fonctions utilitaires (go, toast, openM) restent identiques ...

</script>
</body>
</html>
