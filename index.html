<div class="card">
    <div class="f-group">
        <label>CUSTOMER *</label>
        <div style="display:flex; gap:8px;">
            <select id="selCustomer" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--bd);">
                </select>
            <button type="button" onclick="addOpt('customer')" style="width:40px; background:var(--c1); color:white; border:none; border-radius:8px; cursor:pointer;">+</button>
            <button type="button" onclick="delOpt('customer')" style="width:40px; background:var(--no); color:white; border:none; border-radius:8px; cursor:pointer;">-</button>
        </div>
    </div>

    <div class="f-group" style="margin-top:15px;">
        <label>Style *</label>
        <input type="text" id="inStyle" placeholder="Ex: Slim Fit" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--bd);">
    </div>

    <div class="f-group" style="margin-top:15px;">
        <label>Color *</label>
        <div style="display:flex; gap:8px;">
            <select id="selColor" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--bd);">
                <option value="Black">Black</option>
                <option value="Navy">Navy</option>
                <option value="White">White</option>
            </select>
            <button type="button" onclick="addOpt('color')" style="width:40px; background:var(--c1); color:white; border:none; border-radius:8px; cursor:pointer;">+</button>
        </div>
    </div>

    <div class="f-group" style="margin-top:15px;">
        <label>PO Fabric</label>
        <input type="text" id="inFabric" placeholder="Référence tissu" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--bd);">
    </div>

    <div class="f-group" style="margin-top:15px;">
        <label>OC Number</label>
        <input type="number" id="inOC" placeholder="Numéro OC" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--bd);">
    </div>

    <div style="margin-top:15px;">
        <button type="button" onclick="takePic()" style="width:100%; padding:12px; background:#f8f9fa; border:2px dashed var(--c1); border-radius:12px; color:var(--c1); font-weight:bold;">
            📸 Prendre / Choisir une Photo
        </button>
        <img id="prevImg" src="" style="width:100%; margin-top:10px; border-radius:12px; display:none; max-height:200px; object-fit:cover;">
    </div>

    <hr style="margin:20px 0; border:0; border-top:1px solid var(--bd);">

    <div class="f-group">
        <label>Description</label>
        <textarea id="txDesc" rows="3" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--bd);" placeholder="Vos notes ici..."></textarea>
    </div>

    <div class="f-group" style="margin-top:15px;">
        <label>Lieux précis (Google Map)</label>
        <div id="map" style="width:100%; height:250px; border-radius:12px; background:#eee;">
            </div>
        <button type="button" onclick="getMyPos()" style="margin-top:10px; width:100%; padding:10px; background:var(--ok); color:white; border:none; border-radius:8px;">
            📍 Utiliser ma position actuelle
        </button>
    </div>
</div>
