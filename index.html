<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Aiza - Gestion d'objets</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--c1:#6C63FF;--c2:#5A52D5;--c3:#FF6584;--ok:#00C896;--warn:#FFB946;--no:#FF4757;--bg:#F0F2F5;--txt:#2D3436;--t2:#636E72;--t3:#B2BEC3;--bd:#DFE6E9;--sh:0 2px 12px rgba(0,0,0,.07);--r:16px;--rs:12px}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);max-width:480px;margin:0 auto;line-height:1.5}
input,select,textarea{display:block;width:100%;padding:15px 16px;border:2px solid var(--bd);border-radius:var(--rs);font-size:16px;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--c1);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:13px;font-weight:700;color:var(--t2);margin-bottom:6px}
.btn{-webkit-tap-highlight-color:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:var(--rs);font-size:16px;font-weight:700}
.btn:active{transform:scale(.98)}
.btn-p{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff}
.btn-ok{background:var(--ok);color:#fff}
.btn-no{background:var(--no);color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-ghost{background:var(--bg);color:var(--txt);border:2px solid var(--bd)}
.splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,var(--c1),#4834D4);display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:480px;margin:0 auto;transition:opacity .5s}
.splash.off{opacity:0;pointer-events:none}
.splash .si{font-size:64px;animation:bob 1s ease-in-out infinite}
.splash .sl{font-size:52px;font-weight:900;color:#fff}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:9998;display:none;background:#333;color:#fff;max-width:88%;text-align:center}
.hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:56px;background:#fff;display:none;align-items:center;justify-content:space-between;padding:0 16px;z-index:800;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.hdr.v{display:flex}
.hdr .hl{font-size:22px;font-weight:900;color:var(--c1)}
.hdr .ha{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c3));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;cursor:pointer}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:64px;background:#fff;display:none;align-items:center;justify-content:space-around;z-index:800;box-shadow:0 -1px 10px rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom,0)}
.bnav.v{display:flex}
.nv{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;color:var(--t3);font-size:10px;font-weight:600;padding:6px 12px}
.nv.on{color:var(--c1)}
.nv .ni{font-size:22px}
.nv-add{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(108,99,255,.4);transform:translateY(-10px)}
.pg{display:none;padding:66px 16px 80px;min-height:100vh}
.pg.on{display:block}
.pg-l{display:none;flex-direction:column;min-height:100vh;background:#fff}
.pg-l.on{display:flex}
.lg-h{background:linear-gradient(135deg,var(--c1),#4834D4);padding:48px 24px 32px;color:#fff;text-align:center}
.lg-h h1{font-size:42px;font-weight:900}
.lg-b{flex:1;padding:24px 20px}
.lg-tabs{display:flex;background:var(--bg);border-radius:50px;padding:3px;margin-bottom:20px}
.lg-tab{flex:1;padding:11px;border-radius:50px;border:none;background:none;font-weight:700}
.lg-tab.on{background:#fff;color:var(--c1);box-shadow:var(--sh)}
.wc{background:linear-gradient(135deg,var(--c1),#4834D4);border-radius:var(--r);padding:22px;color:#fff;margin-bottom:18px}
.wc h2{font-size:18px}
.qg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.qa{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 4px;background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:none}
.qa:active{transform:scale(.95)}
.qa-i{width:38px;height:38px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:18px}
.st{font-size:16px;font-weight:800;margin-bottom:12px}
.ic{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);display:flex;gap:12px;cursor:pointer}
.ic-t{width:60px;height:60px;border-radius:var(--rs);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.ic-t img{width:100%;height:100%;object-fit:cover}
.ic-i{flex:1}
.ic-i h3{font-size:14px;font-weight:700}
.ic-l{font-size:11px;color:var(--t2)}
.ic-d{font-size:10px;color:var(--t3)}
.ic-b{width:30px;height:30px;border-radius:8px;border:none;background:rgba(108,99,255,.1);color:var(--c1);font-size:13px}
.sb{position:relative;margin-bottom:14px}
.sb .sic{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--t3)}
.sb input{padding-left:46px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:none;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto}
.mbg.v{display:flex}
.mdl{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:20px}
.mbar{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:10px auto}
.mhd{display:flex;justify-content:space-between;padding:4px 18px 14px;border-bottom:1px solid var(--bd)}
.mhd h2{font-size:18px;font-weight:800}
.mx{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;font-size:18px}
.mbd{padding:18px}
.phg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.phs{width:calc(33.33% - 6px);aspect-ratio:1;border-radius:var(--rs);border:2px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);position:relative;overflow:hidden}
.phs img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.phs .pr{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:var(--no);color:#fff;border:none;font-size:11px}
.phc{font-size:11px;color:var(--t3);text-align:center}
.dyn-group{display:flex;gap:8px;align-items:center}
.dyn-group select{flex:1}
.dyn-group button{padding:8px 12px;width:auto;margin:0;background:var(--bg);border:1px solid var(--bd);border-radius:8px;font-size:12px;font-weight:600}
.dyn-add-btn{margin-top:8px;background:var(--ok);color:#fff;border:none;border-radius:8px;padding:8px;font-size:12px;width:100%}
.map-preview{background:#E8F0FE;border-radius:var(--rs);padding:12px;margin-top:8px;text-align:center;cursor:pointer;border:1px solid var(--c1)}
.map-coord{font-size:12px;color:var(--t2);margin-top:6px}
.camera-btn{background:var(--c1);color:#fff;border:none;border-radius:8px;padding:10px;margin-bottom:10px;font-weight:600}
.emp{text-align:center;padding:32px 16px;color:var(--t2)}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="si">📦</div>
  <div class="sl">Aiza</div>
</div>
<div id="toast"></div>

<!-- LOGIN -->
<div class="pg-l" id="pgL">
  <div class="lg-h"><div style="font-size:42px">📱</div><h1>Aiza</h1><p>Gérez vos objets textiles</p></div>
  <div class="lg-b">
    <div class="lg-tabs"><button class="lg-tab on" id="tL" onclick="swT('l')">Connexion</button><button class="lg-tab" id="tR" onclick="swT('r')">Inscription</button></div>
    <form id="fL" onsubmit="return loginSubmit(event)">
      <div class="fg"><label class="fl">Email</label><input type="email" id="le" placeholder="votre@email.com" required></div>
      <div class="fg"><label class="fl">Mot de passe</label><input type="password" id="lp" placeholder="Mot de passe" required></div>
      <button class="btn btn-p">🔑 Se connecter</button>
    </form>
    <form id="fR" style="display:none" onsubmit="return regSubmit(event)">
      <div class="fg"><label class="fl">Nom complet</label><input type="text" id="rn" required></div>
      <div class="fg"><label class="fl">Email</label><input type="email" id="rem" required></div>
      <div class="fg"><label class="fl">Mot de passe (min 6)</label><input type="password" id="rpw" required minlength="6"></div>
      <div class="fg"><label class="fl">Confirmer</label><input type="password" id="rpw2" required></div>
      <button class="btn btn-p">📝 S'inscrire</button>
    </form>
  </div>
</div>

<!-- HEADER & NAV -->
<header class="hdr" id="hdr"><div class="hl">📦 Aiza</div><div class="ha" id="hAv" onclick="go('profile')">U</div></header>
<nav class="bnav" id="bnav">
  <button class="nv on" onclick="go('home')"><span class="ni">🏠</span><span>Accueil</span></button>
  <button class="nv" onclick="go('search')"><span class="ni">🔍</span><span>Chercher</span></button>
  <button class="nv-add" onclick="openAdd()">+</button>
  <button class="nv" onclick="go('items')"><span class="ni">📋</span><span>Objets</span></button>
  <button class="nv" onclick="go('profile')"><span class="ni">👤</span><span>Profil</span></button>
</nav>

<!-- PAGES -->
<div class="pg" id="pgHome"><div class="wc"><h2 id="wN">Bienvenue</h2><p>Gestion textile & matières</p></div><div class="qg"><button class="qa" onclick="openAdd()"><div class="qa-i">➕</div><span>Ajouter</span></button><button class="qa" onclick="go('search')"><div class="qa-i">🔍</div><span>Recherche</span></button><button class="qa" onclick="go('items')"><div class="qa-i">📦</div><span>Mes objets</span></button><button class="qa" onclick="openAdd()"><div class="qa-i">📍</div><span>Localiser</span></button></div><div class="st">📦 Derniers objets</div><div id="recI"></div></div>
<div class="pg" id="pgSearch"><h2 style="font-size:20px;font-weight:800;margin-bottom:14px">🔍 Recherche</h2><div class="sb"><span class="sic">🔎</span><input type="text" id="sI" placeholder="Nom, Customer, OC Number..." autocomplete="off" oninput="doSearch()"></div><div id="sR"></div></div>
<div class="pg" id="pgItems"><h2 style="font-size:20px;font-weight:800;margin-bottom:14px">📋 Mes objets</h2><div id="iL"></div></div>
<div class="pg" id="pgProfile"><div class="prh" style="text-align:center;padding:20px;background:#fff;border-radius:var(--r)"><div class="pra" style="width:68px;height:68px;border-radius:50%;background:var(--c1);margin:0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px" id="prA">U</div><div class="prn" id="prN" style="font-weight:800"></div><div class="pre" id="prE" style="color:var(--t2)"></div></div><div class="ml" style="background:#fff;border-radius:var(--r);margin-top:16px"><div class="mi" style="display:flex;padding:16px;justify-content:space-between;border-bottom:1px solid var(--bd)" onclick="logout()"><span>🚪 Déconnexion</span><span>›</span></div></div></div>

<!-- ADD MODAL -->
<div class="mbg" id="mA" onclick="if(event.target===this)closeM('mA')"><div class="mdl"><div class="mbar"></div><div class="mhd"><h2>➕ Ajouter un objet</h2><button class="mx" onclick="closeM('mA')">✕</button></div><div class="mbd">
  <!-- Photos -->
  <div><label class="fl">📸 Photos (max 5)</label><div class="phg" id="pG"></div><div class="phc" id="pC">0/5</div><input type="file" id="pF" accept="image/*" style="display:none" multiple onchange="handlePhotos(event)"><button type="button" class="camera-btn btn-sm" style="width:100%;margin-bottom:12px" onclick="openCamera()">📷 Prendre une photo</button></div>
  
  <!-- CUSTOMER (dynamique) -->
  <div class="fg"><label class="fl">👥 CUSTOMER *</label><div class="dyn-group" id="customerGroup"><select id="customerSelect"></select><button type="button" onclick="openAddCustomerModal()" class="btn-sm">➕</button><button type="button" onclick="deleteSelectedCustomer()" class="btn-sm" style="background:#ffe0e0">🗑️</button></div><button type="button" class="dyn-add-btn" onclick="openAddCustomerModal()">+ Ajouter un client</button></div>
  
  <div class="fg"><label class="fl">🏷️ Style</label><input type="text" id="styleField" placeholder="Ex: Slim Fit, Oversized"></div>
  <div class="fg"><label class="fl">🎨 Color</label><input type="text" id="colorField" placeholder="Ex: Bleu marine, Rouge"></div>
  <div class="fg"><label class="fl">🧵 PO Fabric</label><input type="text" id="poFabric" placeholder="Référence tissu"></div>
  <div class="fg"><label class="fl">🔢 OC Number *</label><input type="text" id="ocNumber" placeholder="Numéro OC" required></div>
  
  <!-- Géolocalisation -->
  <div class="fg"><label class="fl">📍 Localisation (GPS)</label><button type="button" class="btn btn-ghost btn-sm" style="width:100%" onclick="getCurrentLocation()">📍 Obtenir ma position</button><div id="locationPreview" class="map-preview" onclick="getCurrentLocation()"><span>🌍 Cliquez pour définir la localisation</span><div id="coordDisplay" class="map-coord"></div></div></div>
  <div class="fg"><label class="fl">📝 Notes</label><textarea id="notesField" rows="2" placeholder="Infos complémentaires..."></textarea></div>
  <button class="btn btn-p" onclick="saveItem()">✅ Enregistrer l'objet</button>
</div></div></div>

<!-- DETAIL MODAL -->
<div class="mbg" id="mD" onclick="if(event.target===this)closeM('mD')"><div class="mdl"><div class="mbar"></div><div class="mhd"><h2 id="dTi">Détail</h2><button class="mx" onclick="closeM('mD')">✕</button></div><div class="mbd" id="dBd"></div></div></div>

<!-- CUSTOMER ADD MODAL -->
<div class="mbg" id="mCustomer" onclick="if(event.target===this)closeM('mCustomer')"><div class="mdl"><div class="mbar"></div><div class="mhd"><h2>➕ Nouveau client</h2><button class="mx" onclick="closeM('mCustomer')">✕</button></div><div class="mbd"><input type="text" id="newCustomerName" placeholder="Nom du client" style="margin-bottom:12px"><button class="btn btn-p" onclick="addCustomerToList()">Ajouter</button></div></div></div>

<script>
// ==================== DATA & STORAGE ====================
let db = { u: [], i: [], customers: ["Cap Union", "Jcrew", "Everlane", "MacDonald", "Faherty"] };
function loadDB() { const data = localStorage.getItem('aiza_db'); if(data) { const p = JSON.parse(data); db = p; if(!db.customers) db.customers = ["Cap Union", "Jcrew", "Everlane", "MacDonald", "Faherty"]; if(!db.i) db.i = []; if(!db.u) db.u = []; saveDB(); } else { initDemo(); } }
function saveDB() { localStorage.setItem('aiza_db', JSON.stringify(db)); }
function initDemo() {
  if(db.u.length===0) db.u = [{ id:'u1', name:'Jean Dupont', email:'user@test.com', pw:'123456', role:'user' }];
  saveDB();
}
let currentUser = null;
let currentEditId = null;
let tempPhotos = [null,null,null,null,null];
let currentLocation = null; // { lat, lng }

// ==================== AUTH ====================
function swT(t){ document.getElementById('tL').classList.toggle('on',t==='l'); document.getElementById('tR').classList.toggle('on',t==='r'); document.getElementById('fL').style.display=t==='l'?'block':'none'; document.getElementById('fR').style.display=t==='r'?'block':'none'; }
function loginSubmit(e){ e.preventDefault(); const em=document.getElementById('le').value.trim(), pw=document.getElementById('lp').value; const u=db.u.find(x=>x.email===em && x.pw===pw); if(!u){ toast('Email ou mot de passe incorrect','no'); return false; } currentUser=u; localStorage.setItem('aiza_user',JSON.stringify({id:u.id})); toast('Connexion réussie','ok'); showApp(); return false; }
function regSubmit(e){ e.preventDefault(); const name=document.getElementById('rn').value.trim(), email=document.getElementById('rem').value.trim(), pw=document.getElementById('rpw').value, pw2=document.getElementById('rpw2').value; if(pw!==pw2){ toast('Mots de passe différents','no'); return false; } if(db.u.find(x=>x.email===email)){ toast('Email déjà utilisé','no'); return false; } const newUser={ id:'u'+Date.now(), name, email, pw, role:'user' }; db.u.push(newUser); saveDB(); currentUser=newUser; localStorage.setItem('aiza_user',JSON.stringify({id:newUser.id})); toast('Inscription réussie','ok'); showApp(); return false; }
function logout(){ currentUser=null; localStorage.removeItem('aiza_user'); document.getElementById('hdr').classList.remove('v'); document.getElementById('bnav').classList.remove('v'); document.getElementById('pgL').classList.add('on'); document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on')); }
function showApp(){ document.getElementById('pgL').classList.remove('on'); document.getElementById('hdr').classList.add('v'); document.getElementById('bnav').classList.add('v'); updateUserUI(); go('home'); }
function updateUserUI(){ if(currentUser){ document.getElementById('hAv').textContent=currentUser.name.charAt(0).toUpperCase(); document.getElementById('prA').textContent=currentUser.name.charAt(0).toUpperCase(); document.getElementById('prN').textContent=currentUser.name; document.getElementById('prE').textContent=currentUser.email; } }
function go(page){ document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on')); document.getElementById(`pg${page.charAt(0).toUpperCase()+page.slice(1)}`).classList.add('on'); document.querySelectorAll('.nv').forEach(n=>n.classList.remove('on')); const idx={home:0,search:1,items:3,profile:4}[page]; if(idx!==undefined) document.querySelectorAll('.nv')[idx]?.classList.add('on'); if(page==='home') renderHome(); if(page==='items') renderItems(); if(page==='search') { renderSearchList(); doSearch(); } }
function renderHome(){ if(!currentUser) return; const myItems = db.i.filter(it=>it.uid===currentUser.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5); document.getElementById('wN').innerHTML=`Bonjour ${currentUser.name.split(' ')[0]} 👋`; const recDiv=document.getElementById('recI'); if(myItems.length===0) recDiv.innerHTML='<div class="emp"><span>📭</span><p>Aucun objet, cliquez sur + pour ajouter</p></div>'; else recDiv.innerHTML=myItems.map(it=>renderItemCard(it)).join(''); }
function renderItems(){ const items=db.i.filter(it=>it.uid===currentUser.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); document.getElementById('iL').innerHTML=items.length===0?'<div class="emp"><span>📭</span><p>Aucun objet</p></div>':items.map(it=>renderItemCard(it)).join(''); }
function renderItemCard(it){ const firstPhoto = it.photos && it.photos[0] ? `<img src="${it.photos[0]}">` : '📦'; return `<div class="ic" onclick="showDetail('${it.id}')"><div class="ic-t">${firstPhoto}</div><div class="ic-i"><h3>${escapeHtml(it.name||'Sans nom')}</h3><div class="ic-l">👥 ${it.customer} | OC: ${it.ocNumber}</div><div class="ic-l">🎨 ${it.color || '-'} | 🧵 ${it.poFabric || '-'}</div><div class="ic-d">${new Date(it.createdAt).toLocaleDateString()}</div></div><div class="ic-a"><button class="ic-b" onclick="event.stopPropagation();editItem('${it.id}')">✏️</button><button class="ic-b" onclick="event.stopPropagation();deleteItem('${it.id}')">🗑️</button></div></div>`; }
function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function showDetail(id){ const it=db.i.find(x=>x.id===id); if(!it) return; document.getElementById('dTi').innerHTML=it.name || 'Objet'; let html=''; if(it.photos && it.photos.length) html+=`<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:12px">${it.photos.map(p=>`<img src="${p}" style="width:100px;height:100px;object-fit:cover;border-radius:8px">`).join('')}</div>`; html+=`<div class="df"><span class="dfl">Client</span><span>${escapeHtml(it.customer)}</span></div><div class="df"><span class="dfl">Style</span><span>${escapeHtml(it.style)}</span></div><div class="df"><span class="dfl">Color</span><span>${escapeHtml(it.color)}</span></div><div class="df"><span class="dfl">PO Fabric</span><span>${escapeHtml(it.poFabric)}</span></div><div class="df"><span class="dfl">OC Number</span><span>${escapeHtml(it.ocNumber)}</span></div><div class="df"><span class="dfl">📍 Localisation</span><span>${it.location ? `${it.location.lat}, ${it.location.lng}` : 'Non définie'}</span></div><div class="df"><span class="dfl">📝 Notes</span><span>${escapeHtml(it.notes)}</span></div><div class="df"><span class="dfl">📅 Date</span><span>${new Date(it.createdAt).toLocaleString()}</span></div><button class="btn btn-p btn-sm" style="margin-top:16px" onclick="closeM('mD');editItem('${it.id}')">✏️ Modifier</button>`; document.getElementById('dBd').innerHTML=html; openM('mD'); }
function deleteItem(id){ if(confirm('Supprimer définitivement cet objet ?')){ db.i=db.i.filter(x=>x.id!==id); saveDB(); renderItems(); if(document.querySelector('.pg.on').id==='pgHome') renderHome(); toast('Objet supprimé','ok'); } }
function editItem(id){ const it=db.i.find(x=>x.id===id); if(!it) return; currentEditId=id; document.getElementById('styleField').value=it.style||''; document.getElementById('colorField').value=it.color||''; document.getElementById('poFabric').value=it.poFabric||''; document.getElementById('ocNumber').value=it.ocNumber||''; document.getElementById('notesField').value=it.notes||''; if(it.customer) setCustomerSelect(it.customer); if(it.photos) { tempPhotos=[...it.photos, null,null,null,null,null].slice(0,5); } else tempPhotos=[null,null,null,null,null]; if(it.location) { currentLocation=it.location; document.getElementById('coordDisplay').innerHTML=`📍 ${it.location.lat}, ${it.location.lng}`; } else { currentLocation=null; document.getElementById('coordDisplay').innerHTML=''; } renderPhotoGrid(); openM('mA'); }
function saveItem(){ const customer=document.getElementById('customerSelect').value; if(!customer){ toast('Veuillez sélectionner un client','no'); return; } const ocNumber=document.getElementById('ocNumber').value.trim(); if(!ocNumber){ toast('OC Number est requis','no'); return; } const itemData={ id: currentEditId || ('i'+Date.now()), uid: currentUser.id, name: `${customer} - ${ocNumber}`, customer, style: document.getElementById('styleField').value, color: document.getElementById('colorField').value, poFabric: document.getElementById('poFabric').value, ocNumber, notes: document.getElementById('notesField').value, location: currentLocation, photos: tempPhotos.filter(p=>p!==null), createdAt: currentEditId ? (db.i.find(x=>x.id===currentEditId)?.createdAt || new Date().toISOString()) : new Date().toISOString() }; if(currentEditId){ const idx=db.i.findIndex(x=>x.id===currentEditId); if(idx!==-1) db.i[idx]=itemData; } else { db.i.push(itemData); } saveDB(); closeM('mA'); resetForm(); renderHome(); renderItems(); toast('Objet enregistré','ok'); currentEditId=null; }
function resetForm(){ document.getElementById('styleField').value=''; document.getElementById('colorField').value=''; document.getElementById('poFabric').value=''; document.getElementById('ocNumber').value=''; document.getElementById('notesField').value=''; tempPhotos=[null,null,null,null,null]; currentLocation=null; document.getElementById('coordDisplay').innerHTML=''; renderPhotoGrid(); if(db.customers.length) setCustomerSelect(db.customers[0]); }
function setCustomerSelect(val){ const sel=document.getElementById('customerSelect'); for(let i=0;i<sel.options.length;i++){ if(sel.options[i].value===val){ sel.selectedIndex=i; break; } } }
function openAdd(){ if(!currentUser) return; currentEditId=null; resetForm(); openM('mA'); }
// CUSTOMER LOGIC
function refreshCustomerDropdown(){ const sel=document.getElementById('customerSelect'); sel.innerHTML=''; db.customers.forEach(c=>{ const opt=document.createElement('option'); opt.value=c; opt.textContent=c; sel.appendChild(opt); }); }
function openAddCustomerModal(){ openM('mCustomer'); document.getElementById('newCustomerName').value=''; }
function addCustomerToList(){ const newName=document.getElementById('newCustomerName').value.trim(); if(!newName){ toast('Nom requis','no'); return; } if(db.customers.includes(newName)){ toast('Client déjà existant','warn'); closeM('mCustomer'); return; } db.customers.push(newName); saveDB(); refreshCustomerDropdown(); setCustomerSelect(newName); closeM('mCustomer'); toast('Client ajouté','ok'); }
function deleteSelectedCustomer(){ const sel=document.getElementById('customerSelect'); const val=sel.value; if(!val) return; if(db.customers.length<=1){ toast('Gardez au moins un client','no'); return; } db.customers=db.customers.filter(c=>c!==val); saveDB(); refreshCustomerDropdown(); toast('Client supprimé','ok'); }
// PHOTO & CAMERA
function openCamera(){ const input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.capture='environment'; input.onchange=(e)=>{ handlePhotos(e); }; input.click(); }
function handlePhotos(event){ const files=event.target.files; if(!files) return; const maxPhotos=5; for(let i=0;i<files.length && i<maxPhotos;i++){ const file=files[i]; if(file.size>5*1024*1024) continue; const reader=new FileReader(); reader.onload=ev=>{ const imgData=ev.target.result; let slot=tempPhotos.findIndex(p=>p===null); if(slot!==-1) tempPhotos[slot]=imgData; renderPhotoGrid(); }; reader.readAsDataURL(file); } event.target.value=''; }
function renderPhotoGrid(){ const container=document.getElementById('pG'); let html=''; for(let i=0;i<5;i++){ if(tempPhotos[i]){ html+=`<div class="phs"><img src="${tempPhotos[i]}"><button class="pr" onclick="event.stopPropagation();removePhoto(${i})">✕</button></div>`; } else { html+=`<div class="phs" onclick="triggerPhotoUpload()"><span>📷</span><span>Photo ${i+1}</span></div>`; } } container.innerHTML=html; document.getElementById('pC').innerHTML=`${tempPhotos.filter(p=>p!==null).length}/5 photos`; }
function triggerPhotoUpload(){ const fileInput=document.getElementById('pF'); fileInput.click(); }
function removePhoto(idx){ tempPhotos[idx]=null; renderPhotoGrid(); }
// GEOLOCATION
function getCurrentLocation(){ if(!navigator.geolocation){ toast('Géolocalisation non supportée','no'); return; } navigator.geolocation.getCurrentPosition(pos=>{ currentLocation={ lat: pos.coords.latitude, lng: pos.coords.longitude }; document.getElementById('coordDisplay').innerHTML=`📍 ${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)}`; toast('Position enregistrée','ok'); }, err=>{ toast('Erreur GPS: '+err.message,'no'); }); }
// SEARCH (filtre dynamique)
function doSearch(){ const keyword=document.getElementById('sI').value.trim().toLowerCase(); let items=db.i.filter(it=>it.uid===currentUser.id); if(keyword){ items=items.filter(it=> (it.customer && it.customer.toLowerCase().includes(keyword)) || (it.ocNumber && it.ocNumber.toLowerCase().includes(keyword)) || (it.name && it.name.toLowerCase().includes(keyword)) || (it.style && it.style.toLowerCase().includes(keyword)) || (it.color && it.color.toLowerCase().includes(keyword)) ); } document.getElementById('sR').innerHTML=items.length===0?'<div class="emp"><span>🔍</span><p>Aucun résultat</p></div>':items.map(it=>renderItemCard(it)).join(''); }
function renderSearchList(){ doSearch(); }
// MODAL & UTILS
function openM(id){ document.getElementById(id).classList.add('v'); document.body.style.overflow='hidden'; }
function closeM(id){ document.getElementById(id).classList.remove('v'); document.body.style.overflow=''; }
function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.style.background=type==='ok'?'var(--ok)':type==='no'?'var(--no)':'var(--warn)'; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
// INIT
document.addEventListener('DOMContentLoaded',()=>{
  loadDB();
  refreshCustomerDropdown();
  const saved=localStorage.getItem('aiza_user');
  if(saved){ const uid=JSON.parse(saved).id; const u=db.u.find(x=>x.id===uid); if(u){ currentUser=u; showApp(); } else { document.getElementById('pgL').classList.add('on'); } } else { document.getElementById('pgL').classList.add('on'); }
  setTimeout(()=>{ const sp=document.getElementById('splash'); sp.classList.add('off'); setTimeout(()=>sp.style.display='none',500); },1200);
});
</script>
</body>
